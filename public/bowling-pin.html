<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: transparent;
    }
    #bowling-pin-stage {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="bowling-pin-stage"></div>
<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  35,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);
camera.position.set(0, 0, 5);

const renderer = new THREE.WebGLRenderer({
  alpha: true,
  antialias: true
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);
document.getElementById("bowling-pin-stage").appendChild(renderer.domElement);

const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
keyLight.position.set(5, 5, 5);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xffffff, 0.5);
fillLight.position.set(-5, 2, 5);
scene.add(fillLight);

const backLight = new THREE.DirectionalLight(0xffffff, 1);
backLight.position.set(0, 5, -5);
scene.add(backLight);

const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

const material = new THREE.MeshPhysicalMaterial({
  color: "#ffffff",
  metalness: 0.1,
  roughness: 0.12,
  clearcoat: 1,
  clearcoatRoughness: 0.03,
});

const points = [];
points.push(new THREE.Vector2(0,    -1.5));
points.push(new THREE.Vector2(0.7,  -1.2));
points.push(new THREE.Vector2(0.5,   0.0));
points.push(new THREE.Vector2(0.4,   1.0));
points.push(new THREE.Vector2(0.25,  1.5));
points.push(new THREE.Vector2(0.3,   1.7));
points.push(new THREE.Vector2(0,     1.9));

const geometry = new THREE.LatheGeometry(points, 128);
const pin = new THREE.Mesh(geometry, material);
scene.add(pin);

const stripeMaterial = new THREE.MeshStandardMaterial({ color: "#E82040" });
const stripeGeometry = new THREE.TorusGeometry(0.28, 0.05, 32, 100);
const stripe = new THREE.Mesh(stripeGeometry, stripeMaterial);
stripe.rotation.x = Math.PI / 2;
stripe.position.y = 1.2;
pin.add(stripe);

const shadowGeometry = new THREE.CircleGeometry(1, 32);
const shadowMaterial = new THREE.MeshBasicMaterial({
  color: 0x000000,
  transparent: true,
  opacity: 0.15
});
const shadow = new THREE.Mesh(shadowGeometry, shadowMaterial);
shadow.rotation.x = -Math.PI / 2;
shadow.position.y = -1.6;
scene.add(shadow);

let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.01;
  pin.rotation.y += 0.004;
  pin.rotation.z = Math.sin(time * 0.8) * 0.04;
  pin.rotation.x = Math.cos(time * 0.6) * 0.03;
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
