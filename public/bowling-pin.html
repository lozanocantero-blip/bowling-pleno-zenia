<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: transparent;
    }
    #home-3d-stage {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 8;
      overflow: hidden;
    }
    #home-3d-stage canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
<div id="home-3d-stage"></div>
<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

const stage = document.getElementById("home-3d-stage");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  35,
  stage.clientWidth / stage.clientHeight,
  0.1,
  100
);

camera.position.set(0, 0.2, 8);

const renderer = new THREE.WebGLRenderer({
  alpha: true,
  antialias: true
});

renderer.setSize(stage.clientWidth, stage.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
stage.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
keyLight.position.set(4, 6, 5);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x87cfff, 0.7);
fillLight.position.set(-5, 3, 4);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 1.1);
rimLight.position.set(0, 4, -6);
scene.add(rimLight);

const whiteGloss = new THREE.MeshPhysicalMaterial({
  color: "#ffffff",
  roughness: 0.13,
  metalness: 0.05,
  clearcoat: 1,
  clearcoatRoughness: 0.04
});

const redGloss = new THREE.MeshPhysicalMaterial({
  color: "#E82040",
  roughness: 0.18,
  clearcoat: 0.8
});

const blueGloss = new THREE.MeshPhysicalMaterial({
  color: "#0072CE",
  roughness: 0.22,
  clearcoat: 0.7
});

const navyMat = new THREE.MeshPhysicalMaterial({
  color: "#1A2744",
  roughness: 0.28,
  clearcoat: 0.5
});

const blackMat = new THREE.MeshPhysicalMaterial({
  color: "#111827",
  roughness: 0.35,
  clearcoat: 0.4
});

const glassMat = new THREE.MeshPhysicalMaterial({
  color: "#F6C35B",
  transparent: true,
  opacity: 0.58,
  roughness: 0.04,
  metalness: 0,
  transmission: 0.35,
  clearcoat: 1,
  clearcoatRoughness: 0.02
});

const foamMat = new THREE.MeshPhysicalMaterial({
  color: "#FFF7E6",
  roughness: 0.45,
  clearcoat: 0.2
});

function roundedBox(w, h, d, mat) {
  return new THREE.Mesh(new THREE.BoxGeometry(w, h, d, 8, 8, 8), mat);
}

function createArcade() {
  const group = new THREE.Group();

  const body = roundedBox(1.25, 1.8, 0.65, navyMat);
  body.position.y = 0;
  group.add(body);

  const marquee = roundedBox(1.15, 0.28, 0.08, redGloss);
  marquee.position.set(0, 0.73, 0.36);
  group.add(marquee);

  const screen = roundedBox(0.82, 0.55, 0.05, blackMat);
  screen.position.set(0, 0.22, 0.38);
  group.add(screen);

  const screenGlow = roundedBox(0.68, 0.38, 0.055, blueGloss);
  screenGlow.position.set(0, 0.22, 0.42);
  group.add(screenGlow);

  const panel = roundedBox(1, 0.24, 0.12, blueGloss);
  panel.position.set(0, -0.35, 0.42);
  panel.rotation.x = -0.25;
  group.add(panel);

  const joystick = new THREE.Mesh(
    new THREE.CylinderGeometry(0.035, 0.035, 0.25, 24),
    blackMat
  );
  joystick.position.set(-0.28, -0.25, 0.55);
  joystick.rotation.x = 0.35;
  group.add(joystick);

  const joyBall = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 32, 32),
    redGloss
  );
  joyBall.position.set(-0.32, -0.12, 0.62);
  group.add(joyBall);

  for (let i = 0; i < 3; i++) {
    const btn = new THREE.Mesh(
      new THREE.SphereGeometry(0.055, 32, 32),
      i === 0 ? redGloss : blueGloss
    );
    btn.position.set(0.08 + i * 0.16, -0.28, 0.56);
    group.add(btn);
  }

  group.position.set(-2.8, -0.15, 0);
  group.rotation.y = 0.35;
  group.rotation.z = -0.05;
  group.scale.setScalar(0.92);

  return group;
}

function createBowlingPin() {
  const group = new THREE.Group();

  const points = [
    new THREE.Vector2(0.05, -1.45),
    new THREE.Vector2(0.5, -1.25),
    new THREE.Vector2(0.68, -0.75),
    new THREE.Vector2(0.48, -0.15),
    new THREE.Vector2(0.35, 0.55),
    new THREE.Vector2(0.26, 1.15),
    new THREE.Vector2(0.34, 1.42),
    new THREE.Vector2(0.16, 1.62),
    new THREE.Vector2(0.02, 1.68)
  ];

  const pinGeo = new THREE.LatheGeometry(points, 128);
  const pin = new THREE.Mesh(pinGeo, whiteGloss);
  group.add(pin);

  const stripe1 = new THREE.Mesh(
    new THREE.TorusGeometry(0.305, 0.045, 32, 128),
    redGloss
  );
  stripe1.rotation.x = Math.PI / 2;
  stripe1.position.y = 1.15;
  group.add(stripe1);

  const stripe2 = new THREE.Mesh(
    new THREE.TorusGeometry(0.325, 0.035, 32, 128),
    redGloss
  );
  stripe2.rotation.x = Math.PI / 2;
  stripe2.position.y = 1.02;
  group.add(stripe2);

  group.position.set(0, 0.02, 0.2);
  group.rotation.z = 0.08;
  group.scale.setScalar(0.9);

  return group;
}

function createBeerMug() {
  const group = new THREE.Group();

  const mug = new THREE.Mesh(
    new THREE.CylinderGeometry(0.48, 0.42, 1.2, 64, 1, true),
    glassMat
  );
  mug.position.y = -0.1;
  group.add(mug);

  const beer = new THREE.Mesh(
    new THREE.CylinderGeometry(0.43, 0.38, 0.92, 64),
    new THREE.MeshPhysicalMaterial({
      color: "#F2A900",
      roughness: 0.2,
      transparent: true,
      opacity: 0.75,
      clearcoat: 0.6
    })
  );
  beer.position.y = -0.18;
  group.add(beer);

  const foamBase = new THREE.Mesh(
    new THREE.CylinderGeometry(0.46, 0.43, 0.16, 64),
    foamMat
  );
  foamBase.position.y = 0.52;
  group.add(foamBase);

  for (let i = 0; i < 7; i++) {
    const bubble = new THREE.Mesh(
      new THREE.SphereGeometry(0.12 + Math.random() * 0.05, 24, 24),
      foamMat
    );
    bubble.position.set(
      (Math.random() - 0.5) * 0.65,
      0.62 + Math.random() * 0.12,
      (Math.random() - 0.5) * 0.35
    );
    group.add(bubble);
  }

  const handle = new THREE.Mesh(
    new THREE.TorusGeometry(0.33, 0.055, 24, 80),
    glassMat
  );
  handle.position.set(0.48, -0.08, 0);
  handle.rotation.y = Math.PI / 2;
  group.add(handle);

  group.position.set(2.65, -0.05, 0);
  group.rotation.y = -0.35;
  group.rotation.z = 0.04;
  group.scale.setScalar(0.95);

  return group;
}

const arcade = createArcade();
const pin = createBowlingPin();
const beer = createBeerMug();

scene.add(arcade);
scene.add(pin);
scene.add(beer);

function createShadow(x, scale) {
  const shadow = new THREE.Mesh(
    new THREE.CircleGeometry(0.75, 48),
    new THREE.MeshBasicMaterial({
      color: 0x000000,
      transparent: true,
      opacity: 0.12
    })
  );
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.set(x, -1.65, 0);
  shadow.scale.set(scale, scale * 0.35, 1);
  scene.add(shadow);
  return shadow;
}

const shadowArcade = createShadow(-2.8, 1.15);
const shadowPin = createShadow(0, 0.95);
const shadowBeer = createShadow(2.65, 0.95);

let t = 0;

function animate() {
  requestAnimationFrame(animate);
  t += 0.01;

  arcade.position.y = -0.15 + Math.sin(t * 0.85) * 0.08;
  arcade.position.x = -2.8 + Math.sin(t * 0.45) * 0.08;
  arcade.rotation.y = 0.35 + Math.sin(t * 0.55) * 0.12;
  arcade.rotation.z = -0.05 + Math.sin(t * 0.75) * 0.035;

  pin.position.y = 0.02 + Math.sin(t * 1.05 + 1.4) * 0.07;
  pin.rotation.y += 0.0045;
  pin.rotation.x = Math.cos(t * 0.65) * 0.035;
  pin.rotation.z = 0.08 + Math.sin(t * 0.8) * 0.045;

  beer.position.y = -0.05 + Math.sin(t * 0.72 + 2.2) * 0.1;
  beer.rotation.y -= 0.0028;
  beer.rotation.x = Math.sin(t * 0.5) * 0.045;
  beer.rotation.z = 0.04 + Math.cos(t * 0.62) * 0.035;

  shadowArcade.material.opacity = 0.10 + Math.sin(t * 0.85) * 0.025;
  shadowPin.material.opacity = 0.11 + Math.sin(t * 1.05 + 1.4) * 0.025;
  shadowBeer.material.opacity = 0.10 + Math.sin(t * 0.72 + 2.2) * 0.025;

  renderer.render(scene, camera);
}

animate();

function resizeScene() {
  const width = stage.clientWidth;
  const height = stage.clientHeight;

  camera.aspect = width / height;
  camera.updateProjectionMatrix();

  renderer.setSize(width, height);

  if (width < 768) {
    camera.position.z = 9.5;
    arcade.position.x = -2.25;
    beer.position.x = 2.25;
  } else {
    camera.position.z = 8;
  }
}

window.addEventListener("resize", resizeScene);
resizeScene();
</script>
</body>
</html>
